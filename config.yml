llm:
  base_url: "https://your-llm-proxy.com/v1"
  triage_model: "deepseek/deepseek-v4-flash"
  summary_model: "deepseek/deepseek-v4-pro"

triage:
  confidence_threshold: 0.8
  whitelist_domains:
    - "@shifamily.com"
  blacklist_keywords:
    - "unsubscribe"
    - "newsletter"
    - "promotions"
    - "marketing"
    - "no-reply"
    - "noreply"
    - "digest"
    - "advertisement"
  blacklist_senders:
    - "spammer@domain.com"
    - "offers@"
    - "newsletters@"
