llm:
  base_url: "https://your-llm-proxy.com/v1"
  triage_model: "homesrv/gemma-4-e2b-it"
  summary_model: "deepseek/deepseek-v4-flash"

triage:
  confidence_threshold: 0.8
  triage_type: "llm"
  tei_url: "https://omniroute.local.shifamily.com/v1/rerank"
  tei_model: "localai/qwen3-reranker-0.6b"
  tei_router_enabled: true
  tei_noise_threshold: 0.6
  tei_signal_threshold: 0.6
  whitelist_vip_senders: []
  whitelist_domains:
    - "@none"
  blacklist_keywords:
    - "unsubscribe"
    - "newsletter"
    - "promotions"
    - "marketing"
    - "digest"
    - "advertisement"
    - "^(Album|Movie|Episode) (Grabbed|Downloaded|Added|Deleted)$"
    - "^(Ordered|Shipped|Delivered): .*"
    - ".* updates$"
    - "^New in .*: .*"
    - "^You're Invited: .*"
  blacklist_senders:
    - "spammer@domain.com"
    - "offers@"
    - "newsletters@"

logging:
  level: "INFO"
